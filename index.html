<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <title>Radar przepisów</title>
    <meta name="description" content="Wyszukaj przepis z produktów które akurat masz w lodówce...">
    <meta name="author" content="Łukasz Kucharczyk, Oliwier Adamczyk 1P">
    <meta name="copyright" content="Copyright Radar Przepisów">

    <link rel="stylesheet" type="text/css" href="assets/styles/index.css">

    <script src="https://kit.fontawesome.com/ac1b82ff7f.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.0.js"></script>
</head>


    <body onload="IndexLoad()">
        <header>
            <h3>Twoje produkty:</h3>
            <ul id="listItem"></ul>
            
            <div id="addItemBar">
                <input type="text" id="newItem" placeholder="Dodaj produkt..." autocomplete="off" onkeydown="return /[a-z, ęóąśłżźćń]/i.test(event.key)" maxlength="20" required>
                <button type="button" id="addItem">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <button id="theme" aria-label="zmień motyw">
                <i class="fa-solid fa-cloud-sun"></i>
            </button>
        </header>


        <content>
            <div>
                <h3 class="content-header">Babka Pomarańczowa</h3>
                <img src="assets/images/test.png" alt="test">


                <h3 class="content-list">Składniki:</h3>
                <ul class="list">
                    <li><span>Mleko</span> 200 ml</li>
                    <li><span>Masło</span> 100 gr</li>
                    <li><span>Jajka</span> 5 szt.</li>
                    <li><span>Mąka</span> pszenna 180 gr</li>
                    <li><span>Cukier</span> puder 100 gr</li>
                </ul>

                <h3 class="content-footer-time"><i class="fa-solid fa-clock"></i> 30 min</h3>
                <h3 class="content-footer-difficult"><i class="fa-solid fa-star"></i> 4/5</h3>
            </div>
            <div id="error">
                <h3>Brak Wyników</h3>
            </div>
        </content>



        <footer>
            <div id="copyright">
                <p>Copyright &copy;2022 Radar Przepisów.</p>
            </div>
            <div id="dev">
                <p>Web developers: Luki & Vapniak</p>
            </div>
        </footer>


        <script>
            try {
                document.body.dataset.theme = localStorage.getItem('theme')
            } catch (e) {
                document.body.dataset.theme = null
            }
        </script>
        <script src="assets/scripts/themes.js"></script>
        <script src="assets/scripts/list.js"></script>
        <script src="assets/scripts/onselect.js"></script>
        <script src="assets/scripts/load.js"></script>
    </body>
</html>
